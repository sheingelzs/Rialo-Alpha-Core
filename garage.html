<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Garage Dashboard | Multi-Chain Explorer</title>
    <script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
    <style>
        :root {
            --neon-cyan: #00f2ff;
            --neon-purple: #bc13fe;
            --bg-dark: #0a0a0c;
            --card-bg: #16161a;
            --text-gray: #a0a0a0;
        }

        body {
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 900px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 15px;
        }

        h1 {
            font-size: 1.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--neon-cyan);
            margin: 0;
        }

        /* Wallet Button Styles */
        .btn-connect {
            background: linear-gradient(45deg, var(--neon-purple), var(--neon-cyan));
            border: none;
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 0 15px rgba(188, 19, 254, 0.4);
        }

        .btn-connect:active {
            transform: scale(0.95);
        }

        /* Responsive Table */
        .table-container {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 15px;
            overflow-x: auto;
            border: 1px solid #333;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 600px;
        }

        th {
            text-align: left;
            padding: 15px;
            border-bottom: 2px solid #333;
            color: var(--text-gray);
            font-size: 0.85rem;
            text-transform: uppercase;
        }

        td {
            padding: 15px;
            border-bottom: 1px solid #222;
            font-size: 0.95rem;
        }

        .badge {
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: bold;
        }

        .badge-evm { background: rgba(0, 242, 255, 0.1); color: var(--neon-cyan); border: 1px solid var(--neon-cyan); }
        .badge-svm { background: rgba(188, 19, 254, 0.1); color: var(--neon-purple); border: 1px solid var(--neon-purple); }
        .badge-move { background: rgba(255, 255, 255, 0.1); color: #fff; border: 1px solid #fff; }

        .status-online { color: #39FF14; font-weight: bold; }

        /* Mobile Specific */
        @media (max-width: 600px) {
            header { flex-direction: column; align-items: flex-start; }
            .btn-connect { width: 100%; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>GARAGE CORE</h1>
        <div style="text-align: right;">
            <button id="connectBtn" class="btn-connect">CONNECT WALLET</button>
            <div id="walletAddr" style="font-size: 10px; margin-top: 5px; color: var(--text-gray);">Not Connected</div>
        </div>
    </header>

    <div class="table-container">
        <table id="networkTable">
            <thead>
                <tr>
                    <th>Network</th>
                    <th>Type</th>
                    <th>Status</th>
                    <th>Node Count</th>
                    <th>Avg TPS</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                </tbody>
        </table>
    </div>
</div>

<script>
    // 1. OFFICIAL DATABASE (EVM, SVM, MOVE)
    const officialData = [
        { name: "Ethereum", type: "EVM", status: "Active", nodes: "12,403", tps: "15" },
        { name: "BSC", type: "EVM", status: "Active", nodes: "2,000+", tps: "2,200" },
        { name: "Polygon", type: "EVM", status: "Active", nodes: "100", tps: "65,000" },
        { name: "Solana", type: "SVM", status: "Active", nodes: "2,945", tps: "2,500+" },
        { name: "Eclipse", type: "SVM", status: "Testnet", nodes: "N/A", tps: "5,000+" },
        { name: "Aptos", type: "MOVE", status: "Active", nodes: "110", tps: "160,000" },
        { name: "Sui", type: "MOVE", status: "Active", nodes: "100+", tps: "297,000" }
    ];

    // 2. RENDER TABLE FUNCTION
    function renderTable() {
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = officialData.map(item => `
            <tr>
                <td><strong>${item.name}</strong></td>
                <td><span class="badge badge-${item.type.toLowerCase()}">${item.type}</span></td>
                <td><span class="status-online">${item.status}</span></td>
                <td>${item.nodes}</td>
                <td>${item.tps}</td>
            </tr>
        `).join('');
    }

    // 3. WALLET CONNECTION LOGIC (MOBILE FRIENDLY)
    async function toggleWallet() {
        const btn = document.getElementById('connectBtn');
        const addrDisplay = document.getElementById('walletAddr');

        if (typeof window.ethereum !== 'undefined') {
            try {
                // Request accounts
                const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                const account = accounts[0];
                
                // Update UI
                btn.innerText = "DISCONNECT";
                addrDisplay.innerText = `ID: ${account.substring(0, 6)}...${account.substring(account.length - 4)}`;
                btn.style.background = "#333";
                
                console.log("Connected to:", account);
            } catch (error) {
                console.error("User rejected request");
            }
        } else {
            // Check if Mobile
            if (/Android|iPhone|iPad/i.test(navigator.userAgent)) {
                // Deep link to MetaMask Mobile Browser
                const dappUrl = window.location.href.split('://')[1];
                window.location.href = `https://metamask.app.link/dapp/${dappUrl}`;
            } else {
                alert("Please install MetaMask or a Web3 Wallet!");
            }
        }
    }

    // Initialize
    window.addEventListener('DOMContentLoaded', () => {
        renderTable();
        document.getElementById('connectBtn').addEventListener('click', toggleWallet);
    });
</script>

</body>
</html>
