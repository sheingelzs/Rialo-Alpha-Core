<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RIALO — Live Predict</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Syne:wght@800&display=swap" rel="stylesheet">
    <style>
        :root { --bg:#050810; --card:#0f1929; --accent:#4ade80; --red:#f87171; --text:#e8eaf0; }
        body { background:var(--bg); color:var(--text); font-family:'Space Grotesk',sans-serif; margin:0; padding:20px; }
        .predict-row { background:var(--card); border:1px solid #1a2a42; padding:20px; border-radius:15px; margin-bottom:10px; display:flex; justify-content:space-between; align-items:center; transition: 0.3s; }
        .price { font-weight:bold; font-size:1.2rem; transition: 0.3s; padding: 2px 8px; border-radius:5px; }
        .up-flash { background: rgba(74, 222, 128, 0.3); color: #4ade80; }
        .down-flash { background: rgba(248, 113, 113, 0.3); color: #f87171; }
        .btn-group button { padding:10px 20px; border:none; border-radius:8px; cursor:pointer; font-weight:bold; margin-left:5px; }
        .up-btn { background:#1a2a42; color:#4ade80; }
        .dn-btn { background:#1a2a42; color:#f87171; }
        .selected-up { background:#4ade80 !important; color:#000 !important; }
        .selected-dn { background:#f87171 !important; color:#fff !important; }
    </style>
</head>
<body>
    <h1 style="font-family:'Syne';">RIALO PREDICT</h1>
    
    <div class="predict-row">
        <div><span>BTC/USDT</span><div id="price-btc" class="price">$92,000.00</div></div>
        <div class="btn-group">
            <button class="up-btn" onclick="this.classList.toggle('selected-up')">UP</button>
            <button class="dn-btn" onclick="this.classList.toggle('selected-dn')">DOWN</button>
        </div>
    </div>

    <div class="predict-row">
        <div><span>ETH/USDT</span><div id="price-eth" class="price">$4,800.00</div></div>
        <div class="btn-group">
            <button class="up-btn" onclick="this.classList.toggle('selected-up')">UP</button>
            <button class="dn-btn" onclick="this.classList.toggle('selected-dn')">DOWN</button>
        </div>
    </div>

    <script>
        let prices = { btc: 92000, eth: 4800 };

        function update() {
            for (let coin in prices) {
                let change = (Math.random() * 20) - 10; // Gerak acak
                let oldPrice = prices[coin];
                prices[coin] += change;
                
                let el = document.getElementById('price-' + coin);
                el.innerText = '$' + prices[coin].toLocaleString(undefined, {minimumFractionDigits: 2});
                
                // Efek Warna Flash
                el.classList.remove('up-flash', 'down-flash');
                void el.offsetWidth; // Reset animasi
                el.classList.add(change > 0 ? 'up-flash' : 'down-flash');
            }
        }
        setInterval(update, 1000); // Update setiap 1 detik
    </script>
</body>
</html>
