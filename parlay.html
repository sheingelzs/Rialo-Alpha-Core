<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Crypto Prediction</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
padding:20px;
}

.market{
display:flex;
gap:10px;
margin-bottom:10px;
align-items:center;
}

button{
padding:6px 12px;
border:none;
border-radius:6px;
cursor:pointer;
}

.up{background:#16a34a;color:white}
.down{background:#dc2626;color:white}

.bet{
background:#1e293b;
padding:10px;
margin-top:10px;
border-radius:6px;
}

.win{color:#22c55e}
.lose{color:#ef4444}

</style>
</head>

<body>

<h2>Crypto Prediction</h2>

<div id="markets"></div>

<h3>Bet Slip</h3>
<div id="slip"></div>

<br>

<input id="amount" placeholder="Bet Amount">
<button onclick="placeBet()">Place Bet</button>

<h3>Active Bets</h3>
<div id="bets"></div>

<script>

const coins=["BTCUSDT","ETHUSDT","SOLUSDT"]

let prices={}
let picks=[]
let bets=[]

function loadMarkets(){

let html=""

coins.forEach(c=>{

html+=`
<div class="market">

<b>${c.replace("USDT","")}</b>

<span id="price_${c}">loading...</span>

<button class="up" onclick="pick('${c}','UP')">UP</button>

<button class="down" onclick="pick('${c}','DOWN')">DOWN</button>

</div>
`

})

document.getElementById("markets").innerHTML=html

}

async function getPrices(){

for(let c of coins){

try{

let r=await fetch("https://api.binance.com/api/v3/ticker/price?symbol="+c)

let d=await r.json()

let price=parseFloat(d.price)

prices[c]=price

let el=document.getElementById("price_"+c)

if(el) el.innerText="$"+price.toFixed(2)

}catch(e){}

}

}

function pick(coin,dir){

let exist=picks.find(p=>p.coin==coin)

if(exist){

exist.dir=dir

}else{

picks.push({
coin:coin,
dir:dir,
entry:prices[coin]
})

}

renderSlip()

}

function renderSlip(){

let html=""

picks.forEach(p=>{

html+=`
<div>
${p.coin.replace("USDT","")} ${p.dir}
Entry $${p.entry.toFixed(2)}
</div>
`

})

document.getElementById("slip").innerHTML=html

}

function placeBet(){

if(picks.length < 2){

alert("Minimal pilih 2 market")

return

}

let amt=document.getElementById("amount").value

if(!amt){

alert("Masukan jumlah bet")

return

}

let bet={

picks:JSON.parse(JSON.stringify(picks)),

amount:Number(amt),

end:Date.now()+60000,

status:"running"

}

bets.push(bet)

picks=[]

renderSlip()

renderBets()

}

function renderBets(){

let html=""

bets.forEach((b,i)=>{

let remain=Math.max(0,Math.floor((b.end-Date.now())/1000))

let timer=b.status=="running"?remain+"s":""

let status="Running"

if(b.status=="win") status="<span class='win'>WIN</span>"
if(b.status=="lose") status="<span class='lose'>LOSE</span>"

html+=`<div class="bet">`

b.picks.forEach(p=>{

html+=`${p.coin.replace("USDT","")} ${p.dir} Entry $${p.entry.toFixed(2)}<br>`

})

html+=`

Amount $${b.amount}<br>

Timer: ${timer}<br>

Result: ${status}

</div>`

})

document.getElementById("bets").innerHTML=html

}

function checkBets(){

bets.forEach(b=>{

if(b.status!="running") return

if(Date.now()>=b.end){

let win=true

b.picks.forEach(p=>{

let final=prices[p.coin]

if(p.dir=="UP" && final<=p.entry) win=false

if(p.dir=="DOWN" && final>=p.entry) win=false

})

b.status=win?"win":"lose"

}

})

renderBets()

}

loadMarkets()

getPrices()

setInterval(getPrices,2000)

setInterval(checkBets,1000)

</script>

</body>
</html>
