<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Crypto Prediction</title>

<style>

body{
font-family:'Segoe UI',sans-serif;
background:#f5f7fb;
margin:0;
padding:20px;
}

h2{
text-align:center;
}

.market{
background:white;
padding:15px;
margin-bottom:10px;
border-radius:8px;
display:flex;
justify-content:space-between;
align-items:center;
}

.price{
font-weight:bold;
}

button{
padding:6px 12px;
border:none;
border-radius:6px;
cursor:pointer;
}

.up{
background:#00c087;
color:white;
}

.down{
background:#ff4d4f;
color:white;
}

.betbox{
margin-top:20px;
background:white;
padding:15px;
border-radius:8px;
}

#betList{
margin-bottom:10px;
}

input{
padding:8px;
width:100%;
margin-top:10px;
}

.place{
background:#2962ff;
color:white;
margin-top:10px;
width:100%;
padding:10px;
}

.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
display:none;
align-items:center;
justify-content:center;
}

.popup-box{
background:white;
padding:20px;
border-radius:10px;
text-align:center;
width:250px;
}

/* HISTORY */

.history{
margin-top:30px;
background:white;
padding:20px;
border-radius:8px;
}

.history-list{
margin-top:10px;
font-size:14px;
}

/* VERSUS */

.versus-section{
margin-top:30px;
background:white;
padding:20px;
border-radius:8px;
}

.vs-grid{
display:flex;
gap:20px;
margin-top:15px;
flex-wrap:wrap;
}

.vs-item{
width:120px;
height:120px;
border-radius:50%;
background:#ffc0e6;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
font-weight:bold;
cursor:pointer;
transition:0.2s;
}

.vs-item:hover{
background:#ff9fd8;
}

</style>

</head>

<body>

<h2>Crypto Prediction</h2>

<div id="markets"></div>

<div class="betbox">

<h3>Bet List</h3>

<div id="betList">
Belum ada pilihan
</div>

<input type="number" id="betAmount" placeholder="Masukan nominal bet" disabled>

<button class="place" onclick="placeBet()">Place Bet</button>

</div>

<!-- HISTORY -->

<div class="history">

<h3>History Parlay</h3>

<div id="historyList" class="history-list">
Belum ada history
</div>

</div>

<!-- VERSUS -->

<div class="versus-section">

<h3>Versus Market</h3>

<div class="vs-grid">

<div class="vs-item" onclick="pickVs('BTC vs ETH')">
BTC<br>VS<br>ETH
</div>

<div class="vs-item" onclick="pickVs('BTC vs SOL')">
BTC<br>VS<br>SOL
</div>

<div class="vs-item" onclick="pickVs('ETH vs SOL')">
ETH<br>VS<br>SOL
</div>

</div>

</div>

<!-- POPUP -->

<div class="popup" id="popup">
<div class="popup-box">
<div id="popupText"></div>
<br>
<button onclick="closePopup()">OK</button>
</div>
</div>

<script>

const markets=["bitcoin","ethereum","solana"]

let picks={}
let prices={}
let history=[]

function showPopup(text){
document.getElementById("popupText").innerText=text
document.getElementById("popup").style.display="flex"
}

function closePopup(){
document.getElementById("popup").style.display="none"
}

function updateBetList(){

let list=document.getElementById("betList")
let html=""

for(let m in picks){
html+=m.toUpperCase()+" - "+picks[m]+"<br>"
}

if(html==="") html="Belum ada pilihan"

list.innerHTML=html

if(Object.keys(picks).length===3){
document.getElementById("betAmount").disabled=false
}

}

function pick(m,d){

if(Object.keys(picks).length>=3 && !picks[m]){
showPopup("Maksimal 3 market")
return
}

picks[m]=d

updateBetList()

}

function pickVs(pair){

if(Object.keys(picks).length>=3){
showPopup("Maksimal 3 pilihan")
return
}

picks[pair]="VS"

updateBetList()

}

function addHistory(text){

history.unshift(text)

if(history.length>10){
history.pop()
}

renderHistory()

}

function renderHistory(){

let el=document.getElementById("historyList")

if(history.length===0){
el.innerHTML="Belum ada history"
return
}

let html=""

history.forEach(h=>{
html+=h+"<br>"
})

el.innerHTML=html

}

function placeBet(){

if(Object.keys(picks).length<3){
showPopup("Pilih 3 market")
return
}

let bet=document.getElementById("betAmount").value

if(!bet || bet<=0){
showPopup("Masukan nominal bet")
return
}

showPopup("Bet berhasil dipasang!")

addHistory("Parlay bet "+bet+" USD")

picks={}

updateBetList()

document.getElementById("betAmount").value=""

document.getElementById("betAmount").disabled=true

}

async function loadPrices(){

try{

let res=await fetch(
"https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum,solana&vs_currencies=usd"
)

let data=await res.json()

prices=data

}catch(e){

}

renderMarkets()

}

function renderMarkets(){

let html=""

markets.forEach(m=>{

let price=prices[m]?prices[m].usd:"--"

html+=`

<div class="market">

<div>

<b>${m.toUpperCase()}</b><br>

<span class="price">$${price}</span>

</div>

<div>

<button class="up" onclick="pick('${m}','UP')">UP</button>

<button class="down" onclick="pick('${m}','DOWN')">DOWN</button>

</div>

</div>

`

})

document.getElementById("markets").innerHTML=html

}

loadPrices()

setInterval(loadPrices,10000)

</script>

</body>
</html>
