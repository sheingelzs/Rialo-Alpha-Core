<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>RIALO — Live Real-Time</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Syne:wght@800&display=swap" rel="stylesheet">
    <style>
        body { background: #050810; color: white; font-family: 'Space Grotesk', sans-serif; padding: 20px; }
        .container { max-width: 900px; margin: auto; display: grid; grid-template-columns: 1fr 300px; gap: 20px; }
        .card { background: #0f172a; border: 1px solid #1e293b; border-radius: 12px; padding: 20px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .price { font-family: monospace; font-size: 1.2rem; color: #4ade80; font-weight: bold; }
        .change { font-size: 0.9rem; margin-left: 10px; }
        .btn-group { display: flex; gap: 10px; }
        button { padding: 10px 15px; border-radius: 6px; border: 1px solid #334155; background: #1e293b; color: white; cursor: pointer; font-weight: bold; }
        button.active-up { background: #4ade80; color: #050810; border-color: #4ade80; }
        button.active-down { background: #f87171; color: white; border-color: #f87171; }
        .slip { background: #0b1120; border: 1px solid #1e293b; border-radius: 12px; padding: 20px; height: fit-content; }
        h2 { font-family: 'Syne', sans-serif; margin-bottom: 20px; }
        .pick-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #1e293b; }
    </style>
</head>
<body>

    <h2>Rialo Crypto Parlay</h2>
    <div class="container">
        <div class="markets">
            <div class="card" id="row-btc">
                <div>
                    <div style="font-weight: bold;">Bitcoin (BTC)</div>
                    <span class="price" id="price-btc">Connecting...</span>
                    <span class="change" id="change-btc">0.00%</span>
                </div>
                <div class="btn-group">
                    <button id="btn-btc-up" onclick="select('btc', 'UP')">▲ UP</button>
                    <button id="btn-btc-down" onclick="select('btc', 'DOWN')">▼ DOWN</button>
                </div>
            </div>

            <div class="card" id="row-eth">
                <div>
                    <div style="font-weight: bold;">Ethereum (ETH)</div>
                    <span class="price" id="price-eth">Connecting...</span>
                    <span class="change" id="change-eth">0.00%</span>
                </div>
                <div class="btn-group">
                    <button id="btn-eth-up" onclick="select('eth', 'UP')">▲ UP</button>
                    <button id="btn-eth-down" onclick="select('eth', 'DOWN')">▼ DOWN</button>
                </div>
            </div>

            <div class="card" id="row-sol">
                <div>
                    <div style="font-weight: bold;">Solana (SOL)</div>
                    <span class="price" id="price-sol">Connecting...</span>
                    <span class="change" id="change-sol">0.00%</span>
                </div>
                <div class="btn-group">
                    <button id="btn-sol-up" onclick="select('sol', 'UP')">▲ UP</button>
                    <button id="btn-sol-down" onclick="select('sol', 'DOWN')">▼ DOWN</button>
                </div>
            </div>
        </div>

        <div class="slip">
            <h3 style="margin-bottom:15px;">Bet Slip</h3>
            <div id="slip-list">No picks yet.</div>
            <hr style="margin: 15px 0; border: 0; border-top: 1px solid #1e293b;">
            <div id="total-picks">Total: 0 picks</div>
            <button style="width:100%; margin-top:15px; background: #4ade80; color:#050810;">Place Bet</button>
        </div>
    </div>

    <script>
        // 1. KONEKSI WEBSOCKET BINANCE (HARGA ASLI)
        const symbols = ['btcusdt', 'ethusdt', 'solusdt'];
        // Menggunakan stream @ticker untuk mendapatkan harga dan persentase 24 jam
        const wsUrl = `wss://stream.binance.com:9443/ws/${symbols.map(s => `${s}@ticker`).join('/')}`;
        const socket = new WebSocket(wsUrl);

        socket.onmessage = (event) => {
            const data = JSON.parse(event.data);
            const coin = data.s.replace('USDT', '').toLowerCase(); // btc, eth, atau sol
            
            const price = parseFloat(data.c); // Harga penutupan terakhir
            const change = parseFloat(data.P); // Persentase perubahan 24 jam

            // Update ke HTML
            const priceEl = document.getElementById(`price-${coin}`);
            const changeEl = document.getElementById(`change-${coin}`);

            if (priceEl) {
                priceEl.innerText = `$${price.toLocaleString(undefined, { minimumFractionDigits: 2 })}`;
            }
            if (changeEl) {
                changeEl.innerText = `${change >= 0 ? '+' : ''}${change.toFixed(2)}%`;
                changeEl.style.color = change >= 0 ? '#4ade80' : '#f87171';
            }
        };

        // 2. LOGIKA PILIHAN (PARLAY)
        let selections = {}; // Simpan pilihan user { btc: 'UP', eth: 'DOWN' }

        function select(coin, direction) {
            // Jika klik tombol yang sama, hapus pilihan (toggle)
            if (selections[coin] === direction) {
                delete selections[coin];
            } else {
                selections[coin] = direction;
            }
            updateUI(coin);
        }

        function updateUI(activeCoin) {
            // Update warna tombol
            ['btc', 'eth', 'sol'].forEach(c => {
                const btnUp = document.getElementById(`btn-${c}-up`);
                const btnDown = document.getElementById(`btn-${c}-down`);
                
                btnUp.className = selections[c] === 'UP' ? 'active-up' : '';
                btnDown.className = selections[c] === 'DOWN' ? 'active-down' : '';
            });

            // Update isi Bet Slip
            const slipList = document.getElementById('slip-list');
            const totalPicks = document.getElementById('total-picks');
            const keys = Object.keys(selections);

            if (keys.length === 0) {
                slipList.innerHTML = 'No picks yet.';
                totalPicks.innerText = 'Total: 0 picks';
            } else {
                slipList.innerHTML = keys.map(k => `
                    <div class="pick-item">
                        <span>${k.toUpperCase()}</span>
                        <b style="color:${selections[k] === 'UP' ? '#4ade80' : '#f87171'}">${selections[k]}</b>
                    </div>
                `).join('');
                totalPicks.innerText = `Total: ${keys.length} picks`;
            }
        }

        socket.onerror = (err) => console.error("WebSocket Error");
    </script>
</body>
</html>
