<!DOCTYPE html>

    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #08090a; }
    </style>
</head>
<body class="text-white antialiased">

    <nav class="border-b border-gray-800 bg-[#08090a] sticky top-0 z-50 px-6 py-4">
        <div class="max-w-7xl mx-auto flex items-center justify-between">
            <div class="flex items-center gap-2">

            <div class="space-y-4">

                    <span class="text-[10px] font-black text-green-400 bg-green-400/10 px-2.5 py-1 rounded-md border border-green-400/20 uppercase tracking-widest">Winner</span>

                <div class="flex justify-between items-center p-4 bg-black/40 rounded-2xl border border-gray-800/50 hover:border-gray-600 transition">

                    <span class="text-[10px] font-black text-green-400 bg-green-400/10 px-2.5 py-1 rounded-md border border-green-400/20 uppercase tracking-widest">Winner</span>
                </div>
            </div>

            <button class="w-full bg-white text-black font-black py-4 rounded-2xl mt-10 hover:bg-gray-200 active:scale-95 transition shadow-xl shadow-white/5 uppercase tracking-tighter">
                Generate Prediction
            </button>
        </div>

        <a href="menu.html" class="mt-10 flex items-center gap-2 text-gray-500 hover:text-white transition text-xs font-bold uppercase tracking-[0.2em]">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-4 h-4">
                <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5 3 12m0 0 7.5-7.5M3 12h18" />
            </svg>
