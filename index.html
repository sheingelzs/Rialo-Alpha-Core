<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RIALO - Alpha Core</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* CSS Tambahan untuk interaksi */
        .btn-initialize {
            cursor: pointer;
            color: #00ff41; /* Hijau Matrix/Cyberpunk */
            text-decoration: underline;
            transition: 0.3s;
            display: inline-block;
            margin-top: 10px;
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
        }
        .btn-initialize:hover {
            color: #fff;
            text-shadow: 0 0 10px #00ff41;
        }
        #main-menu {
            display: none; /* Sembunyi di awal */
            margin-top: 20px;
            border-top: 1px solid #333;
            padding-top: 15px;
        }
        .menu-item {
            list-style: none;
            padding: 5px 0;
            color: #00ff41;
        }
    </style>
</head>
<body class="terminal">
    <div class="container">
        <header>
            <img src="images/market.png" alt="Rialo Logo" class="logo">
            <h1>RIALO NETWORK</h1>
            <p>The Supermodular L1 Blockchain Stack</p>
        </header>

        <main>
            <div id="init-section">
                <div class="btn-initialize" onclick="startCore()">
                    [ INITIALIZE ALPHA CORE ]
                    <br>
                    <span style="font-size: 0.8em;">> Click to Get Started <</span>
                </div>
            </div>

            <div id="loading-status" style="display: none;">
                <p>Security Protocol Alpha-7...</p>
                <p>Establishing Neural Link...</p>
            </div>

            <div id="main-menu">
                <div class="system-log">
                    [SYSTEM]: DATA PROTOCOLS LOADED. RIALO CORE v2.4 ONLINE.
                </div>
                
                <nav>
                    <ul class="menu-list">
                        <li class="menu-item">> <a href="#rialo">RIALO INFO</a></li>
                        <li class="menu-item">> <a href="#roadmap">ROADMAP</a></li>
                        <li class="menu-item">> <a href="#backed">BACKED BY</a></li>
                        <li class="menu-item">> <a href="#community">COMMUNITY</a></li>
                    </ul>
                </nav>

                <div class="terminal-input">
                    <span>>>> </span><input type="text" id="command-line" placeholder="Enter command..." autofocus>
                </div>
            </div>
        </main>
    </div>

    <script>
        function startCore() {
            // Sembunyikan tombol initialize
            document.getElementById('init-section').style.display = 'none';
            
            // Tampilkan loading sebentar (efek estetik)
            const loading = document.getElementById('loading-status');
            loading.style.display = 'block';

            setTimeout(() => {
                loading.style.display = 'none';
                // Langsung tampilkan menu utama
                const mainMenu = document.getElementById('main-menu');
                mainMenu.style.display = 'block';
                document.getElementById('command-line').focus();
            }, 1500); // Delay 1.5 detik agar terasa seperti loading sistem
        }
    </script>
</body>
</html>
