<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RIALO - Alpha Core Technical Oracle</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');

        body { font-family: 'Inter', sans-serif; background-color: #020202; color: white; margin: 0; overflow: hidden; }
        #neural-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }
        .ui-layer { position: relative; z-index: 10; }
        .hidden-ui { display: none !important; }
        .chat-bubble { border-radius: 4px; border-left: 3px solid #9333ea; background: rgba(10, 10, 10, 0.75); backdrop-filter: blur(12px); border-top: 1px solid rgba(255,255,255,0.05); }
        #chat-container { scroll-behavior: smooth; height: calc(100vh - 200px); overflow-y: auto; }
        .cursor { display: inline-block; width: 8px; height: 15px; background: #9333ea; margin-left: 4px; animation: blink 0.8s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
        #scan-screen { position: fixed; inset: 0; background: #020202; z-index: 100; display: none; flex-direction: column; align-items: center; justify-content: center; color: #9333ea; }
        .progress-bar { width: 240px; height: 2px; background: #111; margin-top: 20px; position: relative; overflow: hidden; }
        .progress-fill { position: absolute; height: 100%; background: #9333ea; animation: fill 3s ease-in-out forwards; }
        @keyframes fill { from { width: 0; } to { width: 100%; } }

        /* ===== 3D LOGO SYSTEM ===== */
        .logo-scene {
            perspective: 400px;
            perspective-origin: 50% 50%;
            width: 128px;
            height: 128px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo-3d-wrapper {
            transform-style: preserve-3d;
            animation: spin3D 8s ease-in-out infinite;
            position: relative;
            width: 128px;
            height: 128px;
        }

        @keyframes spin3D {
            0%   { transform: rotateY(0deg)   rotateX(8deg)  rotateZ(0deg); }
            25%  { transform: rotateY(90deg)  rotateX(-4deg) rotateZ(2deg); }
            50%  { transform: rotateY(180deg) rotateX(8deg)  rotateZ(0deg); }
            75%  { transform: rotateY(270deg) rotateX(-4deg) rotateZ(-2deg); }
            100% { transform: rotateY(360deg) rotateX(8deg)  rotateZ(0deg); }
        }

        /* Main face */
        .logo-face-front {
            position: absolute;
            inset: 0;
            backface-visibility: visible;
            filter:
                drop-shadow(0 0 18px rgba(147, 51, 234, 0.9))
                drop-shadow(0 0 50px rgba(147, 51, 234, 0.5));
        }

        .logo-face-front img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        /* Depth layer - simulates 3D thickness */
        .logo-depth-layer {
            position: absolute;
            inset: 0;
            filter:
                drop-shadow(2px 3px 0px rgba(80, 20, 140, 0.9))
                drop-shadow(4px 6px 0px rgba(50, 10, 100, 0.7))
                drop-shadow(6px 9px 0px rgba(30, 5, 70, 0.5));
            animation: depthPulse 8s ease-in-out infinite;
            opacity: 0.85;
        }

        .logo-depth-layer img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        @keyframes depthPulse {
            0%, 100% { filter: drop-shadow(2px 3px 0px rgba(80, 20, 140, 0.9)) drop-shadow(4px 6px 0px rgba(50, 10, 100, 0.7)); }
            50%       { filter: drop-shadow(-2px 3px 0px rgba(80, 20, 140, 0.9)) drop-shadow(-4px 6px 0px rgba(50, 10, 100, 0.7)); }
        }

        /* Glow ring underneath */
        .logo-glow-ring {
            position: absolute;
            bottom: -12px;
            left: 50%;
            transform: translateX(-50%);
            width: 100px;
            height: 20px;
            background: radial-gradient(ellipse, rgba(147,51,234,0.6) 0%, transparent 70%);
            border-radius: 50%;
            animation: glowPulse 2.5s ease-in-out infinite;
            filter: blur(4px);
        }

        @keyframes glowPulse {
            0%, 100% { opacity: 0.6; transform: translateX(-50%) scaleX(1); }
            50%       { opacity: 1;   transform: translateX(-50%) scaleX(1.2); }
        }

        .logo-3d-wrapper:hover {
            animation-play-state: paused;
        }

        .logo-3d-wrapper:hover .logo-face-front {
            filter:
                drop-shadow(0 0 30px rgba(147, 51, 234, 1))
                drop-shadow(0 0 80px rgba(147, 51, 234, 0.7))
                drop-shadow(0 0 120px rgba(147, 51, 234, 0.4));
        }
        /* ===== END 3D LOGO ===== */
    </style>
</head>
<body class="antialiased">

    <canvas id="neural-canvas"></canvas>

    <!-- LANDING PAGE -->
    <div id="landing-page" class="ui-layer flex flex-col min-h-screen items-center justify-center p-6 text-center">
        <div class="mb-10 p-6 bg-[#0a0a0a]/60 rounded-full border border-purple-900/30 shadow-2xl backdrop-blur-md" style="position:relative;">

            <!-- 3D Logo Container -->
            <div class="logo-scene">
                <div class="logo-3d-wrapper">
                    <!-- Depth layer (renders behind, offset) -->
                    <div class="logo-depth-layer">
                        <img src="images/market.png" alt="">
                    </div>
                    <!-- Main face -->
                    <div class="logo-face-front">
                        <img src="images/market.png" alt="Rialo Logo">
                    </div>
                </div>
            </div>

            <!-- Ground glow -->
            <div class="logo-glow-ring"></div>
        </div>

        <h1 class="text-6xl md:text-8xl font-black tracking-tighter italic uppercase mb-4 leading-none">RIALO <span class="text-purple-600">NETWORK</span></h1>
        <p class="text-gray-400 font-mono text-[10px] tracking-[0.5em] uppercase mb-12">The Supermodular L1 Blockchain Stack</p>

        <div class="flex flex-col sm:flex-row gap-4 items-center">
            <button onclick="startScanning('terminal')" class="px-12 py-5 bg-white text-black font-black uppercase text-xs tracking-[0.2em] hover:bg-purple-600 hover:text-white transition-all active:scale-95">
                Initialize Alpha Core
            </button>
            <button onclick="startScanning('app')" class="px-12 py-5 bg-transparent border border-purple-600 text-purple-400 font-black uppercase text-xs tracking-[0.2em] hover:bg-purple-600 hover:text-white transition-all active:scale-95">
                Get Started
            </button>
        </div>
    </div>

    <!-- SCAN SCREEN -->
    <div id="scan-screen">
        <div class="text-[9px] tracking-[0.6em] mb-2 uppercase opacity-40">Security Protocol Alpha-7</div>
        <div class="text-xs font-bold uppercase italic tracking-widest text-white">Establishing Neural Link...</div>
        <div class="progress-bar"><div class="progress-fill"></div></div>
    </div>

    <!-- TERMINAL UI -->
    <div id="terminal-ui" class="hidden-ui flex-col h-screen ui-layer">
        <nav class="p-6 border-b border-white/5 flex justify-between items-center bg-[#020202]/70 backdrop-blur-lg">
            <span class="text-xs font-black uppercase tracking-widest italic">RIALO <span class="text-purple-600">ORACLE</span></span>
            <button onclick="location.reload()" class="text-[9px] text-gray-600 hover:text-white uppercase font-mono tracking-widest border border-gray-900 px-3 py-1 rounded">Terminate</button>
        </nav>
        <main id="chat-container" class="flex-grow p-6 space-y-8 max-w-5xl mx-auto w-full">
            <div class="chat-bubble p-6 text-[11px] font-mono leading-relaxed text-purple-300">
                [SYSTEM]: DATA PROTOCOLS LOADED. RIALO CORE v2.4 ONLINE. <br><br>
                Welcome, Builder. Query the Oracle using keywords like RIALO, BACKED, or ROADMAP.
            </div>
        </main>
        <div class="p-6 bg-[#020202]/90 border-t border-white/5 backdrop-blur-xl">
            <div class="max-w-5xl mx-auto flex gap-4">
                <div class="relative flex-grow">
                    <span class="absolute left-4 top-1/2 -translate-y-1/2 text-purple-600 font-bold text-xs">>>></span>
                    <input type="text" id="user-input" autocomplete="off" placeholder="Type your query..." class="w-full bg-[#0a0a0a]/60 border border-white/10 p-4 pl-14 text-xs font-mono focus:outline-none focus:border-purple-600 text-purple-100 transition-all">
                </div>
                <button onclick="handleSend()" class="bg-white text-black px-8 font-black uppercase text-xs hover:bg-purple-600 hover:text-white transition-all active:scale-95">EXECUTE</button>
            </div>
        </div>
    </div>

    <script src="ai.js"></script>
    <script>
        let scanDestination = 'terminal';

        function startScanning(destination) {
            scanDestination = destination || 'terminal';
            document.getElementById('landing-page').classList.add('hidden-ui');
            const scanner = document.getElementById('scan-screen');
            scanner.style.display = 'flex';

            setTimeout(() => {
                if (scanDestination === 'app') {
                    window.location.href = 'menu.html';
                } else {
                    scanner.style.display = 'none';
                    const terminal = document.getElementById('terminal-ui');
                    terminal.classList.remove('hidden-ui');
                    terminal.classList.add('flex');
                }
            }, 3000);
        }
    </script>
</body>
</html>
