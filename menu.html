<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pink Flower Menu</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: Arial, sans-serif;
}

body{
  background: linear-gradient(to bottom, #ffb6d9, #ff69b4);
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  overflow:hidden;
  position:relative;
  flex-direction:column;
}

/* 🌸 Flower animation */
.flower{
  position:absolute;
  top:-50px;
  font-size:24px;
  animation: fall linear infinite;
  opacity:0.8;
}

@keyframes fall{
  0%{
    transform: translateY(-50px) translateX(0);
  }
  100%{
    transform: translateY(110vh) translateX(30px);
  }
}

/* Menu Layout */
.menu-container{
  width:85%;
  max-width:1100px;
  display:flex;
  justify-content:center;
  align-items:center;
  gap:120px;
  z-index:2;
}

.menu-item{
  text-align:center;
}

.menu-item img{
  width:25vw;
  max-width:200px;
  height:auto;
  object-fit:contain;
  cursor:pointer;
  transition:0.4s;
}

.menu-item img:hover{
  transform:scale(1.15);
  filter: drop-shadow(0 0 40px #fff);
}

.menu-title{
  margin-top:25px;
  font-size:28px;
  font-weight:800;
  letter-spacing:3px;
  color:white;
  text-shadow:0 0 15px rgba(255,255,255,0.9);
}

/* Footer */
.footer{
  position:absolute;
  bottom:15px;
  width:90%;
  max-width:1100px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  color:white;
  font-weight:bold;
  z-index:5;
}

.footer a{
  color:white;
  text-decoration:none;
  transition:0.3s;
}

.footer a:hover{
  text-shadow:0 0 10px white;
}

.footer-center{
  text-align:center;
  line-height:1.6;
}

/* Responsive */
@media(max-width:768px){
  .menu-container{
    flex-direction:column;
    gap:70px;
  }
}
</style>
</head>

<body>

<!-- 🌸 Flowers -->
<div class="flower" style="left:10%; animation-duration:10s;">🌸</div>
<div class="flower" style="left:25%; animation-duration:12s;">🌸</div>
<div class="flower" style="left:40%; animation-duration:8s;">🌸</div>
<div class="flower" style="left:55%; animation-duration:14s;">🌸</div>
<div class="flower" style="left:70%; animation-duration:9s;">🌸</div>
<div class="flower" style="left:85%; animation-duration:11s;">🌸</div>

<div class="menu-container">

  <!-- PARLAY -->
  <div class="menu-item">
    <a href="parlay.html">
      <img src="images/parlay.png" alt="Parlay">
    </a>
    <div class="menu-title">PARLAY 🌸</div>
  </div>

  <!-- MARKET -->
  <div class="menu-item">
    <a href="markett.html">
      <img src="images/markett.png" alt="Market">
    </a>
    <div class="menu-title">MARKET 🌸</div>
  </div>

</div>

<!-- Footer -->
<div class="footer">

  <!-- Kiri (Logo X) -->
  <div>
    <a href="https://x.com/rialohq?s=21" target="_blank">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="white">
        <path d="M18.244 2H21l-6.545 7.478L22 22h-6.828l-5.347-7.04L3.7 22H1l7.012-8.01L2 2h6.828l4.83 6.372L18.244 2Zm-2.394 18h1.885L8.248 3.875H6.232L15.85 20Z"/>
      </svg>
    </a>
  </div>

  <!-- Tengah -->
  <div class="footer-center">
    <div>
      <a href="https://x.com/rayhn_1991?s=21" target="_blank">Gelz</a>
    </div>
    <div>
      <a href="https://x.com/sheinasalisha?s=21" target="_blank">Sheina</a>
    </div>
  </div>

  <!-- Kanan (Discord Logo) -->
  <div>
    <a href="https://discord.gg/rialoprotocol" target="_blank">
      <svg class="discord-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
        <path fill="white" d="M20.317 4.369a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.249a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.249.077.077 0 0 0-.079-.037 19.736 19.736 0 0 0-4.885 1.515.07.07 0 0 0-.032.027C.533 9.046-.32 13.579.099 18.057a.082.082 0 0 0 .031.056 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028c.462-.63.873-1.295 1.226-1.994a.076.076 0 0 0-.041-.105 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128c.126-.094.252-.192.372-.291a.074.074 0 0 1 .077-.01c3.927 1.793 8.18 1.793 12.061 0a.074.074 0 0 1 .078.009c.12.1.246.198.372.292a.077.077 0 0 1-.006.128 12.298 12.298 0 0 1-1.873.891.076.076 0 0 0-.04.106c.36.698.771 1.363 1.225 1.993a.076.076 0 0 0 .084.028 19.876 19.876 0 0 0 6.002-3.03.077.077 0 0 0 .031-.055c.5-5.177-.838-9.674-3.548-13.66a.061.061 0 0 0-.031-.028z"/>

</div>
</body>
</html>
