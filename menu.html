<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rialo Ecosystem - Menu</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        
        body { 
            margin: 0; 
            padding: 0; 
            font-family: 'Inter', sans-serif; 
            background-color: #08090a; 
            color: white;
            overflow: hidden;
        }

        /* --- BACKGROUND ANIMATION (TECH GRID) --- */
        .bg-gradient {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at 50% 50%, #1e2023 0%, #08090a 100%);
            z-index: -2;
        }

        .grid-overlay {
            position: fixed;
            inset: 0;
            background-image: linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: -1;
            mask-image: radial-gradient(ellipse at center, black, transparent 80%);
        }

        /* Efek Cahaya Berjalan */
        @keyframes scan {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(100vh); }
        }
        .scanline {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100px;
            background: linear-gradient(to bottom, transparent, rgba(74, 222, 128, 0.05), transparent);
            animation: scan 8s linear infinite;
            z-index: -1;
        }

        /* --- MENU STYLING --- */
        .menu-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 80px;
            min-height: 100vh;
            z-index: 10;
        }

        .menu-card {
            position: relative;
            text-align: center;
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .menu-card img {
            width: 200px;
            height: auto;
            filter: drop-shadow(0 0 20px rgba(0,0,0,0.5));
            transition: all 0.5s ease;
        }

        .menu-card:hover img {
            transform: translateY(-20px) scale(1.1);
            filter: drop-shadow(0 0 40px rgba(255,255,255,0.2));
        }

        .menu-card::after {
            content: '';
            position: absolute;
            bottom: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 10px;
            background: rgba(255,255,255,0.1);
            filter: blur(10px);
            border-radius: 50%;
            opacity: 0;
            transition: 0.5s;
        }

        .menu-card:hover::after {
            opacity: 1;
            width: 120px;
        }

        .menu-title {
            margin-top: 30px;
            font-weight: 900;
            font-size: 1.5rem;
            letter-spacing: 5px;
            text-transform: uppercase;
            color: #94a3b8;
            transition: 0.3s;
        }

        .menu-card:hover .menu-title {
            color: white;
            text-shadow: 0 0 20px rgba(255,255,255,0.5);
        }

        @media (max-width: 768px) {
            .menu-container { flex-direction: column; gap: 50px; }
            .menu-card img { width: 150px; }
        }
    </style>
</head>
<body>

    <div class="bg-gradient"></div>
    <div class="grid-overlay"></div>
    <div class="scanline"></div>

    <div class="menu-container">
        <a href="parlay.html" class="menu-card">
            <img src="images/parlay.png" alt="Parlay">
            <div class="menu-title">PARLAY</div>
        </a>

        <a href="markett.html" class="menu-card">
            <img src="images/markett.png" alt="Market">
            <div class="menu-title">MARKET</div>
        </a>
    </div>

    <div class="fixed bottom-8 w-full flex justify-between px-10 items-center">
        <a href="https://x.com/rialohq" target="_blank" class="hover:scale-110 transition opacity-50 hover:opacity-100">
            <img src="images/x.png" class="w-6 h-6">
        </a>
        <div class="text-[10px] font-bold tracking-[0.3em] text-gray-600 uppercase flex gap-6">
            <a href="https://x.com/rayhn_1991" class="hover:text-white transition">Gelz</a>
            <a href="https://x.com/sheinasalisha" class="hover:text-white transition">Sheina</a>
        </div>
        <a href="https://discord.gg/rialoprotocol" target="_blank" class="hover:scale-110 transition opacity-50 hover:opacity-100">
            <img src="images/discord.png" class="w-6 h-6">
        </a>
    </div>

</body>
</html>
